<<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>金融市場 長期相関分析（日足）</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 25px; font-size: 22px; }
        .btn-group { text-align: center; margin-bottom: 20px; }
        button { 
            padding: 10px 24px; margin: 0 8px; cursor: pointer; border: 1px solid #ddd; 
            background: white; border-radius: 25px; transition: 0.3s; font-weight: bold; color: #555;
            outline: none;
        }
        button:hover { background: #f0f0f0; }
        button.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        #chart { width: 100%; height: 700px; }
        .loading { text-align: center; padding: 100px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>金融市場 長期相関分析（日足）</h1>
    <div class="btn-group" id="period-btns">
        <button onclick="changePeriod(1, this)">過去1年</button>
        <button onclick="changePeriod(3, this)">過去3年</button>
        <button onclick="changePeriod(5, this)">過去5年</button>
        <button onclick="changePeriod(10, this)" class="active">過去10年</button>
    </div>
    <div id="chart"><div class="loading">データを取得中...</div></div>
</div>

<script>
    // --- 1. Supabase設定 (ご自身の値に書き換えてください) ---
    const SUPABASE_URL = "https://bpejbrkehykbsvclcrqp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Y6wSssmiHZi04nrQsMnLEA_I8v3qkOK";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allTraces = [];

    async function initChart() {
        const { data, error } = await _supabase
            .from('market_data')
            .select('label, value, created_at')
            .order('created_at', { ascending: true });

        if (error) {
            document.getElementById('chart').innerText = "エラー: " + error.message;
            return;
        }

        if (!data || data.length === 0) {
            document.getElementById('chart').innerHTML = "<div class='loading'>データが空です。Pythonで過去データを投入してください。</div>";
            return;
        }

        const tracesMap = {};
        data.forEach(row => {
            if (!tracesMap[row.label]) {
                tracesMap[row.label] = {
                    x: [], y: [], name: row.label, type: 'scatter', mode: 'lines',
                    line: { width: 1.8 },
                    connectgaps: true
                };
            }
            tracesMap[row.label].x.push(row.created_at);
            tracesMap[row.label].y.push(row.value);
        });

        const rateLabels = ['US10Y', 'JP10Y', 'EU10Y', 'US_RATE', 'JP_RATE'];
        Object.values(tracesMap).forEach(t => {
            if (rateLabels.includes(t.name)) t.yaxis = 'y2';
        });

        allTraces = Object.values(tracesMap);
        
        // 初回描画
        const defaultBtn = document.querySelector('button.active');
        renderInitialChart(10, defaultBtn);
    }

    function renderInitialChart(years, element) {
        const now = new Date();
        const startDate = new Date();
        startDate.setFullYear(now.getFullYear() - years);
        const startStr = startDate.toISOString().split('T')[0];
        const endStr = now.toISOString().split('T')[0];

        const layout = {
            hovermode: 'x unified',
            xaxis: { type: 'date', range: [startStr, endStr], gridcolor: '#eee' },
            yaxis: { title: '為替レート', autorange: true, fixedrange: false, gridcolor: '#eee' },
            yaxis2: { title: '金利 (%)', overlaying: 'y', side: 'right', autorange: true, fixedrange: false, showgrid: false },
            legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' },
            margin: { t: 20, b: 100, l: 60, r: 60 },
            plot_bgcolor: '#fff',
            paper_bgcolor: '#fff'
        };

        const chartDiv = document.getElementById('chart');
        Plotly.newPlot(chartDiv, allTraces, layout, {responsive: true});

        // ホバーイベント登録
        chartDiv.on('plotly_legendhover', function(ev) {
            Plotly.restyle(chartDiv, {
                'line.width': allTraces.map((_, i) => i === ev.curveNumber ? 5 : 1),
                'opacity': allTraces.map((_, i) => i === ev.curveNumber ? 1 : 0.15)
            });
        });
        chartDiv.on('plotly_legendunhover', () => {
            Plotly.restyle(chartDiv, { 'line.width': 1.8, 'opacity': 1 });
        });
    }

   function changePeriod(years, element) {
        document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
        if(element) element.classList.add('active');

        const now = new Date();
        const startDate = new Date();
        startDate.setFullYear(now.getFullYear() - years);

        // --- 修正ポイント：比較用の日付を数値（タイムスタンプ）に変換 ---
        const startTime = startDate.getTime();
        const endTime = now.getTime();

        const chartDiv = document.getElementById('chart');
        
        // 軸の範囲を更新
        Plotly.relayout(chartDiv, {
            'xaxis.range': [startDate.toISOString().split('T')[0], now.toISOString().split('T')[0]],
            'yaxis.autorange': true,
            'yaxis2.autorange': true
        });
    }

    initChart();
</script>
</body>
</html>
