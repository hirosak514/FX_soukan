<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>金融市場 相関ダッシュボード</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
        #chart { width: 100%; height: 650px; }
    </style>
</head>
<body>

<div class="container">
    <h1>金融市場 相関チャート</h1>
    <div id="chart"></div>
</div>

<script>
    // --- Supabase設定 ---
    const SUPABASE_URL = "https://bpejbrkehykbsvclcrqp.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_Y6wSssmiHZi04nrQsMnLEA_I8v3qkOK"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function drawChart() {
        const { data, error } = await _supabase
            .from('market_data')
            .select('label, value, created_at')
            .order('created_at', { ascending: true })
            .limit(2000);

        if (error || !data) return;

        const tracesMap = {};
        data.forEach(row => {
            if (!tracesMap[row.label]) {
                tracesMap[row.label] = {
                    x: [], y: [], name: row.label, type: 'scatter', mode: 'lines',
                    line: { width: 2 }
                };
            }
            tracesMap[row.label].x.push(new Date(row.created_at));
            tracesMap[row.label].y.push(row.value);
        });

        // 右軸設定
        const rateLabels = ['US10Y', 'JP10Y', 'EU10Y', 'US_RATE', 'JP_RATE'];
        Object.values(tracesMap).forEach(t => {
            if (rateLabels.includes(t.name)) t.yaxis = 'y2';
        });

        const plotData = Object.values(tracesMap);
        const layout = {
            hovermode: 'closest',
            xaxis: { type: 'date' },
            yaxis: { title: '為替レート', autorange: true, fixedrange: false },
            yaxis2: { title: '金利 (%)', overlaying: 'y', side: 'right', autorange: true, fixedrange: false },
            legend: { orientation: 'h', y: -0.15 },
            margin: { t: 30, b: 100, l: 60, r: 60 }
        };

        const chartDiv = document.getElementById('chart');
        
        // グラフ描画
        Plotly.newPlot(chartDiv, plotData, layout, {responsive: true});

        // --- ホバー強調処理の改善 ---
        chartDiv.on('plotly_legendhover', function(eventData) {
            const curveNumber = eventData.curveNumber;
            const updateWidths = plotData.map((_, i) => i === curveNumber ? 5 : 1);
            const updateOpacities = plotData.map((_, i) => i === curveNumber ? 1 : 0.2);
            
            Plotly.restyle(chartDiv, {
                'line.width': updateWidths,
                'opacity': updateOpacities
            });
        });

        // --- ホバー解除 ---
        chartDiv.on('plotly_legendunhover', function() {
            Plotly.restyle(chartDiv, {
                'line.width': 2,
                'opacity': 1
            });
        });
    }

    drawChart();
    setInterval(drawChart, 300000);
</script>
</body>
</html>
