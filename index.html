<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>金融市場 相関ダッシュボード</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 5px; }
        #chart { width: 100%; height: 650px; }
        .info { background: #e9ecef; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>金融市場 相関チャート</h1>
    <div class="info">
        凡例（下の文字）にマウスを乗せると、そのラインが太くなります
    </div>
    <div id="chart"></div>
</div>

<script>
    // --- Supabase設定 ---
    const SUPABASE_URL = "https://bpejbrkehykbsvclcrqp.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_Y6wSssmiHZi04nrQsMnLEA_I8v3qkOK"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function drawChart() {
        const { data, error } = await _supabase
            .from('market_data')
            .select('label, value, created_at')
            .order('created_at', { ascending: true })
            .limit(2000);

        if (error) return;

        const traces = {};
        data.forEach(row => {
            if (!traces[row.label]) {
                traces[row.label] = {
                    x: [], y: [], name: row.label, type: 'scatter', mode: 'lines',
                    line: { width: 2, color: null } // 初期設定の太さ
                };
            }
            traces[row.label].x.push(new Date(row.created_at));
            traces[row.label].y.push(row.value);
        });

        const rateLabels = ['US10Y', 'JP10Y', 'EU10Y', 'US_RATE', 'JP_RATE'];
        rateLabels.forEach(l => { if (traces[l]) traces[l].yaxis = 'y2'; });

        const plotData = Object.values(traces);
        const layout = {
            hovermode: 'closest',
            xaxis: { type: 'date' },
            yaxis: { title: '為替レート', autorange: true, fixedrange: false },
            yaxis2: { title: '金利 (%)', overlaying: 'y', side: 'right', autorange: true, fixedrange: false },
            legend: { orientation: 'h', y: -0.2 },
            margin: { t: 50, b: 100, l: 60, r: 60 }
        };

        const chartDiv = document.getElementById('chart');
        Plotly.newPlot(chartDiv, plotData, layout);

        // --- ホバー強調イベント ---
        chartDiv.on('plotly_legendhover', function(data) {
            const update = { 'line.width': plotData.map((_, i) => i === data.curveNumber ? 6 : 1.5) };
            const opacity = { 'opacity': plotData.map((_, i) => i === data.curveNumber ? 1 : 0.3) };
            Plotly.restyle(chartDiv, { ...update, ...opacity });
        });

        // --- ホバー解除で元に戻す ---
        chartDiv.on('plotly_legendunhover', function(data) {
            const update = { 'line.width': 2, 'opacity': 1 };
            Plotly.restyle(chartDiv, update);
        });
    }

    drawChart();
    setInterval(drawChart, 300000);
</script>
</body>
</html>
